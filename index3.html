<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Touch Play</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d0d1a;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ─── Canvas setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Helpers ─────────────────────────────────────────────────────────────────
const rand = (min, max) => Math.random() * (max - min) + min;
const randInt = (min, max) => Math.floor(rand(min, max + 1));
const pick = arr => arr[randInt(0, arr.length - 1)];

const COLORS = [
  '#FF4757','#FF6B81','#FF7F50','#FFA502','#FFD700',
  '#2ED573','#1E90FF','#5352ED','#A29BFE','#FD79A8',
  '#00CEC9','#FDCB6E','#E17055','#74B9FF','#55EFC4',
];

const SHAPE_TYPES   = ['circle','square','triangle','star','diamond','pentagon','heart'];
const GRAVITY       = 0.45;
const MAX_SHAPES    = 200;
const MAX_PARTICLES = 400;
const RESTITUTION   = 0.68;  // bounciness: 0=inelastic, 1=perfectly elastic

// ─── Drawing primitives ───────────────────────────────────────────────────────
function drawCircle(ctx, size) {
  ctx.beginPath();
  ctx.arc(0, 0, size, 0, Math.PI * 2);
  ctx.fill();
}

function drawSquare(ctx, size) {
  ctx.fillRect(-size, -size, size * 2, size * 2);
}

function drawTriangle(ctx, size) {
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.lineTo(size * 0.866, size * 0.5);
  ctx.lineTo(-size * 0.866, size * 0.5);
  ctx.closePath();
  ctx.fill();
}

function drawStar(ctx, size) {
  const spikes = 5;
  const inner  = size * 0.45;
  let   rot    = -Math.PI / 2;
  const step   = Math.PI / spikes;
  ctx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const r = i % 2 === 0 ? size : inner;
    ctx.lineTo(Math.cos(rot) * r, Math.sin(rot) * r);
    rot += step;
  }
  ctx.closePath();
  ctx.fill();
}

function drawDiamond(ctx, size) {
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.lineTo(size * 0.65, 0);
  ctx.lineTo(0, size);
  ctx.lineTo(-size * 0.65, 0);
  ctx.closePath();
  ctx.fill();
}

function drawPentagon(ctx, size) {
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * 2 * Math.PI / 5) - Math.PI / 2;
    ctx.lineTo(Math.cos(a) * size, Math.sin(a) * size);
  }
  ctx.closePath();
  ctx.fill();
}

function drawHeart(ctx, size) {
  const h = size;
  ctx.beginPath();
  ctx.moveTo(0, h * 0.3);
  ctx.bezierCurveTo(-h * 0.05, h * 0.05, -h, h * 0.05, -h, -h * 0.22);
  ctx.bezierCurveTo(-h, -h * 0.58, -h * 0.35, -h * 0.78, 0, -h * 0.48);
  ctx.bezierCurveTo(h * 0.35, -h * 0.78, h, -h * 0.58, h, -h * 0.22);
  ctx.bezierCurveTo(h, h * 0.05, h * 0.05, h * 0.05, 0, h * 0.3);
  ctx.closePath();
  ctx.fill();
}

const DRAWERS = { circle: drawCircle, square: drawSquare, triangle: drawTriangle,
                  star: drawStar, diamond: drawDiamond, pentagon: drawPentagon, heart: drawHeart };

// ─── Shape class ─────────────────────────────────────────────────────────────
class Shape {
  constructor(x, y) {
    this.x     = x;
    this.y     = y;
    this.vx    = rand(-2.5, 2.5);
    this.vy    = rand(-9, -4);
    this.size  = rand(28, 72);
    this.color = pick(COLORS);
    this.type  = pick(SHAPE_TYPES);
    this.angle = rand(0, Math.PI * 2);
    this.spin  = rand(-0.07, 0.07);
    this.alpha = 1;

    this.mass     = this.size * this.size;   // area-proportional mass

    this.dragged  = false;
    this.grounded = false;
    this.groundAt = 0;
    this.groundTTL = rand(500, 5000);  // time alive on ground before fading
    this.dead     = false;
  }

  update(dt) {
    if (this.dead) return;
    if (this.dragged) return;

    if (!this.grounded) {
      this.vy    += GRAVITY;
      this.x     += this.vx;
      this.y     += this.vy;
      this.angle += this.spin;

      // Wall bounce
      if (this.x - this.size < 0) {
        this.x  = this.size;
        this.vx = Math.abs(this.vx) * 0.6;
      } else if (this.x + this.size > canvas.width) {
        this.x  = canvas.width - this.size;
        this.vx = -Math.abs(this.vx) * 0.6;
      }

      // Hit ground
      if (this.y + this.size >= canvas.height) {
        this.y        = canvas.height - this.size;
        this.vy       = 0;
        this.vx       = 0;
        this.spin     = 0;
        this.grounded = true;
        this.groundAt = performance.now();
      }
    } else {
      const age = performance.now() - this.groundAt;
      if (age > this.groundTTL) {
        const fade = (age - this.groundTTL) / 600;
        this.alpha  = Math.max(0, 1 - fade);
        if (this.alpha <= 0) this.dead = true;
      }
    }
  }

  draw() {
    if (this.dead) return;
    ctx.save();
    ctx.globalAlpha  = this.alpha;
    ctx.shadowColor  = this.color;
    ctx.shadowBlur   = 18;
    ctx.fillStyle    = this.color;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    DRAWERS[this.type](ctx, this.size);
    ctx.restore();
  }
}

// ─── Particle class (explosion confetti) ─────────────────────────────────────
class Particle {
  constructor(x, y) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(6, 24);
    this.x     = x;
    this.y     = y;
    this.vx    = Math.cos(angle) * speed;
    this.vy    = Math.sin(angle) * speed - rand(4, 8);
    this.size  = rand(6, 18);
    this.color = pick(COLORS);
    this.born  = performance.now();
    this.life  = rand(600, 1800);
    this.alpha = 1;
    this.dead  = false;
  }

  update() {
    if (this.dead) return;
    const age = performance.now() - this.born;
    this.alpha = Math.max(0, 1 - age / this.life);
    if (this.alpha <= 0) { this.dead = true; return; }
    this.vy += 0.4;
    this.vx *= 0.98;
    this.x  += this.vx;
    this.y  += this.vy;
  }

  draw() {
    if (this.dead) return;
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle   = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur  = 10;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── State ───────────────────────────────────────────────────────────────────
const shapes    = [];
const particles = [];

// Active touches: id → { shape, startTime, lastX, lastY, fired }
const activeTouches = new Map();

// Explosion / background flash state
let explosion = null; // { startTime, duration }

// ─── Explosion trigger ────────────────────────────────────────────────────────
function triggerExplosion() {
  explosion = { startTime: performance.now(), duration: 3000 };

  // Burst from every active touch point
  for (const data of activeTouches.values()) {
    const count = Math.min(80, MAX_PARTICLES - particles.length);
    for (let i = 0; i < count; i++) {
      particles.push(new Particle(data.lastX, data.lastY));
    }
    data.fired = true;
  }
}

// ─── Background draw ─────────────────────────────────────────────────────────
function drawBackground() {
  if (explosion) {
    const age  = performance.now() - explosion.startTime;
    if (age >= explosion.duration) {
      explosion = null;
    } else {
      const hue = (age * 0.25) % 360;
      const sat = 70 + 20 * Math.sin(age * 0.005);
      ctx.fillStyle = `hsl(${hue},${sat}%,22%)`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      return;
    }
  }
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ─── Touch events ─────────────────────────────────────────────────────────────
function onTouchStart(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (shapes.length >= MAX_SHAPES) continue;
    const s = new Shape(t.clientX, t.clientY);
    s.dragged = true;
    s.vy      = 0;
    s.vx      = 0;
    shapes.push(s);
    activeTouches.set(t.identifier, {
      shape:     s,
      startTime: performance.now(),
      lastX:     t.clientX,
      lastY:     t.clientY,
      fired:     false,
    });
  }
}

function onTouchMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const data = activeTouches.get(t.identifier);
    if (!data) continue;
    data.lastX = t.clientX;
    data.lastY = t.clientY;

    // Dragged shape follows finger exactly
    if (data.shape && !data.shape.dead) {
      data.shape.x = t.clientX;
      data.shape.y = t.clientY;
    }

    // Spawn small trail shape occasionally
    if (shapes.length < MAX_SHAPES && Math.random() < 0.25) {
      const trail = new Shape(t.clientX + rand(-15, 15), t.clientY + rand(-15, 15));
      trail.size *= 0.45;
      trail.vy   = rand(-4, -1);
      shapes.push(trail);
    }
  }
}

function onTouchEnd(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const data = activeTouches.get(t.identifier);
    if (data && data.shape && !data.shape.dead) {
      data.shape.dragged = false;
      data.shape.vx = rand(-3, 3);
      data.shape.vy = rand(-7, -2);
    }
    activeTouches.delete(t.identifier);
  }
}

canvas.addEventListener('touchstart',  onTouchStart,  { passive: false });
canvas.addEventListener('touchmove',   onTouchMove,   { passive: false });
canvas.addEventListener('touchend',    onTouchEnd,    { passive: false });
canvas.addEventListener('touchcancel', onTouchEnd,    { passive: false });

// ─── Collision resolution ─────────────────────────────────────────────────────

// Elastic impulse between two objects along collision normal.
// Returns false if objects are separating (no impulse needed).
function applyImpulse(a, b, nx, ny, invMa, invMb) {
  const dvx  = a.vx - b.vx;
  const dvy  = a.vy - b.vy;
  const vRel = dvx * nx + dvy * ny;
  if (vRel <= 0) return; // already separating

  const j = -(1 + RESTITUTION) * vRel / (invMa + invMb);
  a.vx += j * invMa * nx;
  a.vy += j * invMa * ny;
  b.vx -= j * invMb * nx;
  b.vy -= j * invMb * ny;

  // Add a little spin kick proportional to tangential impulse
  const tx   = -ny, ty = nx;
  const vTan = dvx * tx + dvy * ty;
  a.spin = a.spin !== undefined ? a.spin - vTan * 0.0012 : 0;
  b.spin = b.spin !== undefined ? b.spin + vTan * 0.0012 : 0;
}

// Shape ↔ shape elastic collisions (O(n²) — fine up to ~200 shapes).
function resolveShapeCollisions() {
  const live = shapes.filter(s => !s.dead && !s.dragged);
  for (let i = 0; i < live.length; i++) {
    const a = live[i];
    for (let j = i + 1; j < live.length; j++) {
      const b    = live[j];
      const dx   = b.x - a.x;
      const dy   = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
      const minD = a.size + b.size;
      if (dist >= minD) continue;

      // Unit normal from a → b
      const nx = dx / dist;
      const ny = dy / dist;

      // Separate overlapping shapes proportional to inverse mass
      const overlap = (minD - dist) * 0.5;
      const invMa   = a.grounded ? 0 : 1 / a.mass;
      const invMb   = b.grounded ? 0 : 1 / b.mass;
      const totalInv = invMa + invMb || 1;

      if (!a.grounded) { a.x -= nx * overlap * (invMa / totalInv); a.y -= ny * overlap * (invMa / totalInv); }
      if (!b.grounded) { b.x += nx * overlap * (invMb / totalInv); b.y += ny * overlap * (invMb / totalInv); }

      if (invMa + invMb === 0) continue;
      applyImpulse(a, b, nx, ny, invMa, invMb);

      // A strong enough hit can knock a grounded shape back into the air
      if (a.grounded && a.vy < -1.5) { a.grounded = false; }
      if (b.grounded && b.vy < -1.5) { b.grounded = false; }
    }
  }
}

// Explosion particle ↔ shape collisions.
// Particles are light (mass=1) so shapes barely deflect; particles bounce away.
function resolveParticleCollisions() {
  const liveShapes = shapes.filter(s => !s.dead);
  for (const p of particles) {
    if (p.dead) continue;
    for (const s of liveShapes) {
      const dx   = p.x - s.x;
      const dy   = p.y - s.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
      const minD = p.size + s.size * 0.85; // slightly smaller hitbox feels better
      if (dist >= minD) continue;

      const nx = dx / dist;
      const ny = dy / dist;

      // Push particle out of shape
      const overlap = minD - dist;
      p.x += nx * overlap;
      p.y += ny * overlap;

      // Impulse — particle mass is tiny so shape barely reacts
      const invP = 1;            // 1 / particle_mass (=1)
      const invS = s.dragged || s.grounded ? 0 : 1 / s.mass;
      applyImpulse(p, s, nx, ny, invP, invS);
    }
  }
}

// ─── Check for 5-second holds ─────────────────────────────────────────────────
function checkHolds() {
  if (explosion) return; // already exploding
  const now = performance.now();
  for (const data of activeTouches.values()) {
    if (!data.fired && now - data.startTime >= 5000) {
      triggerExplosion();
      return;
    }
  }
}

// ─── Main loop ────────────────────────────────────────────────────────────────
function loop() {
  drawBackground();
  checkHolds();

  // Update positions first
  for (let i = shapes.length - 1; i >= 0; i--) {
    shapes[i].update();
    if (shapes[i].dead) shapes.splice(i, 1);
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    if (particles[i].dead) particles.splice(i, 1);
  }

  // Resolve collisions after all positions are current
  resolveShapeCollisions();
  if (particles.length > 0) resolveParticleCollisions();

  // Draw
  for (const p of particles) p.draw();
  for (const s of shapes)    s.draw();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
